---
<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      </div>
    </header>

    <main class="site-main wrapper">
      {{ content }}
    </main>

    <footer class="site-footer wrapper">
      <p><strong>{{ site.description }}</strong></p>
      <p>Software Engineer. Mental Health Worker. Building toward Computational Psychiatry.</p>
      {% if site.github.build_revision %}
        <p class="build-id">Build {{ site.github.build_revision }}</p>
      {% endif %}
    </footer>
  </body>
</html>
