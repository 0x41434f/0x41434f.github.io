<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <header class="site-header">
      <div class="wrapper">
        <h1 class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      </div>
    </header>

    <main class="site-main wrapper">
      {{ content }}
    </main>

    <footer class="site-footer wrapper">
      <p>© 2026</p>
      <p>
        <a href="https://x.com/0x41434f" aria-label="X">🐦</a>
        <a href="https://linkedin.com/in/0x41434f" aria-label="LinkedIn">🔗</a>
        <a href="https://github.com/0x41434f" aria-label="GitHub">🐙</a>
      </p>
      {% if site.github.build_revision %}
        <p class="build-id">Build {{ site.github.build_revision }}</p>
      {% endif %}
    </footer>
  </body>
</html>
